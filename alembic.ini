[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names: {rev}_{slug}
file_template = %%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max characters in the slug portion of the file name
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# even if autogenerate is not requested.  This is useful if 'autogenerate'
# is customized to use database introspection.
revision_environment = false

# Logging configuration — keep it concise
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
